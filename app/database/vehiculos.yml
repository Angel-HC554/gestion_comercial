columns:
  # Es string porque a veces los números económicos tienen letras o ceros a la izquierda
  no_economico: 
    type: string
    unique: true
  serie:
    type: string
  
  departamento: string
  ubicacion: string
  placas: string
  tipo_vehiculo: string
  marca: string
  modelo: string
  año: integer

  # Contador de órdenes activas
  ordenes_pendientes:
    type: integer
    default: 0
  
  en_taller:
    type: boolean
    default: 0
    
  finalizado:
    type: boolean
    default: true

  estado: string
  # 'Arrendado' o 'Propio (CFE)'
  propiedad: string
    
  rpe_responsable: 
    type: string
    nullable: true
